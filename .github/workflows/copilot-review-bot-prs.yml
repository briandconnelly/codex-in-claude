name: Copilot review for bot PRs

# GitHub's automatic Copilot code review (the copilot_code_review ruleset rule)
# skips pull requests authored by bots/GitHub Apps that hold no Copilot seat, to
# avoid burning premium requests on automation floods. Our agent identity,
# briandconnelly-agent[bot], is exactly such an author, so its PRs never get the
# automatic review that human-authored PRs do. This workflow closes that gap by
# explicitly requesting the copilot-pull-request-reviewer[bot] reviewer on the
# bot's own non-draft PRs — on open/reopen/ready-for-review and on every push
# (`synchronize`), mirroring the review-on-open + review-on-push + "no drafts"
# behavior the ruleset gives human-authored PRs. Scoped to briandconnelly-agent[bot]
# only; other bot/agent authors (e.g. dependabot[bot], kingpy-bot) are not covered.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

# Least privilege: requesting a reviewer needs pull-requests: write; nothing else.
permissions:
  pull-requests: write

jobs:
  request-copilot-review:
    name: request-copilot-review
    runs-on: ubuntu-latest
    # Only the bot's own non-draft PRs, and only when the PR branch lives in this
    # repo (not a fork) — a fork PR gets a read-only token that can't request a
    # reviewer, so the head-repo check keeps this from failing avoidably.
    if: >-
      github.event.pull_request.user.login == 'briandconnelly-agent[bot]' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Request Copilot review
        env:
          GH_TOKEN: ${{ secrets.COPILOT_REVIEW_PAT || github.token }}
          COPILOT_REVIEW_PAT: ${{ secrets.COPILOT_REVIEW_PAT }}
          # Bind untrusted event data through env rather than interpolating it
          # into the run script.
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          reviewer='copilot-pull-request-reviewer[bot]'
          if [ -z "${COPILOT_REVIEW_PAT:-}" ]; then
            echo "::warning::No user PAT configured (COPILOT_REVIEW_PAT is empty). Copilot review cannot be requested with the default github.token (#236). skipping."
            exit 0
          fi
          # Request the Copilot reviewer with an explicit JSON body (avoids any
          # ambiguity in how `-f reviewers[]=…[bot]` is parsed). A `synchronize`
          # (push) re-run can 422 because Copilot is still a pending reviewer from a
          # prior event — that's fine (its pending review will cover the new commits),
          # so don't abort on it; the GET below is authoritative. Capture the POST
          # output so a genuine failure is diagnosable rather than hidden.
          post_out=$(printf '{"reviewers":["%s"]}' "$reviewer" \
            | gh api --method POST -H "Accept: application/vnd.github+json" \
                "repos/${REPO}/pulls/${PR_NUMBER}/requested_reviewers" --input - 2>&1) || true
          # A non-user token silently drops the request (#236). Verify against the PR
          # object's requested_reviewers and fail loudly if Copilot is absent — an
          # already-pending request (the tolerated-422 case) still counts as success.
          reviewers_now=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.requested_reviewers[].login' || true)
          if printf '%s\n' "$reviewers_now" | grep -qxF "$reviewer"; then
            echo "Copilot review requested for PR #${PR_NUMBER}."
          else
            echo "::error::Copilot review request did not register — '${reviewer}' is absent from the PR's requested reviewers (see #236)."
            echo "POST response:"; printf '%s\n' "$post_out"
            echo "Requested reviewers now:"; printf '%s\n' "${reviewers_now:-<none>}"
            exit 1
          fi
