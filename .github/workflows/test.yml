name: Test

on:
  workflow_call:

# Least-privilege: the gate only reads the repo. Keep OIDC/environment OUT of here.
permissions:
  contents: read

jobs:
  gate:
    name: lint + types + tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Check GitHub Actions are SHA-pinned
        run: uv run python scripts/check_github_actions_pinning.py
      - name: Lint
        run: uv run ruff check .
      - name: Format
        run: uv run ruff format --check .
      - name: Type check
        run: uv run ty check
      - name: Test (95% coverage floor)
        run: uv run pytest
